<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OBS用 受信画面 v1.0.2</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        #setup { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.85); padding: 12px 16px; border-radius: 8px; font-size: 13px; }
        .version { display: inline-block; background: #ffc107; color: #000; padding: 1px 5px; border-radius: 3px; font-weight: bold; margin-left: 5px; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        input, button { padding: 6px 10px; font-size: 13px; }
        #status { margin-left: 8px; color: #ffca28; }
    </style>
</head>
<body>
    <div id="setup">
        <span>受信ツール <span class="version">v1.0.2</span></span>
        <div style="margin-top: 8px;">
            <input type="password" id="pass" placeholder="パスワードを入力">
            <button id="connectBtn">受信開始</button>
            <span id="status">待機中</span>
        </div>
    </div>

    <video id="remoteVideo" autoplay playsinline muted></video>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const status = document.getElementById('status');
        const setup = document.getElementById('setup');
        const video = document.getElementById('remoteVideo');

        const urlParams = new URLSearchParams(window.location.search);
        const passParam = urlParams.get('pass');

        // WebRTC通信を成立させるためのダミー音声ストリームを作成する関数
        function createDummyStream() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const dst = ctx.createMediaStreamDestination();
            osc.connect(dst);
            osc.start();
            const track = dst.stream.getAudioTracks()[0];
            track.enabled = false; // 無音化
            return new MediaStream([track]);
        }

        function startConnect(pass) {
            pass = pass.trim();
            status.innerText = '接続試行中...';
            
            const peer = new Peer();

            peer.on('open', () => {
                const targetId = 'yshere-' + encodeURIComponent(pass);
                const dummyStream = createDummyStream();
                let activeCall = null;

                function attemptCall() {
                    if (activeCall) activeCall.close();

                    console.log('発信試行:', targetId);
                    activeCall = peer.call(targetId, dummyStream);

                    activeCall.on('stream', (remoteStream) => {
                        console.log('ストリーム受信成功！');
                        video.srcObject = remoteStream;
                        
                        video.play().then(() => {
                            video.muted = false;
                            status.innerText = '接続完了！';
                            status.style.color = '#4caf50';
                            setTimeout(() => { setup.style.opacity = '0.15'; }, 2000);
                        }).catch(e => {
                            console.log('自動再生制約対応');
                            video.muted = true;
                            video.play();
                            status.innerText = '接続完了 (ミュート再生中)';
                        });
                    });
                }

                attemptCall();
            });

            peer.on('error', (err) => {
                status.innerText = 'エラー: ' + err.type;
            });
        }

        connectBtn.onclick = () => {
            const pass = document.getElementById('pass').value;
            if (pass) startConnect(pass);
        };

        if (passParam) {
            document.getElementById('pass').value = passParam;
            startConnect(passParam);
        }
    </script>
</body>
</html>
