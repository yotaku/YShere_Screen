<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画面＆音声 送信ツール v1.0.5.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .version { background: #ffc107; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        #status { margin-top: 15px; font-weight: bold; color: #ffca28; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <h2 style="margin:0;">画面・音声 送信</h2>
            <span class="version">v1.0.5</span>
        </div>
        <div style="margin-top: 15px;">
            <label>パスワード (共有キー)</label>
            <input type="password" id="pass" placeholder="半角英数字で入力">
            <button id="startBtn">画面とマイクを選択して開始</button>
        </div>
        <div id="status">状態: 待機中</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            const pass = document.getElementById('pass').value.trim();
            if (!pass) return alert('パスワードを入力してください');

            try {
                // 1. 画面共有
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 60, max: 60 } },
                    audio: true
                });

                const vTrack = displayStream.getVideoTracks()[0];
                if (!vTrack) {
                    alert('画面キャプチャの取得に失敗しました');
                    return;
                }

                // 2. マイク音声
                let micStream = null;
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                } catch (e) {
                    console.log('マイク未選択');
                }

                // 3. 音声の合成
                const audioCtx = new AudioContext();
                const dest = audioCtx.createMediaStreamDestination();

                if (displayStream.getAudioTracks().length > 0) {
                    const displaySource = audioCtx.createMediaStreamSource(displayStream);
                    displaySource.connect(dest);
                }
                if (micStream && micStream.getAudioTracks().length > 0) {
                    const micSource = audioCtx.createMediaStreamSource(micStream);
                    micSource.connect(dest);
                }

                const combinedStream = new MediaStream([
                    vTrack,
                    ...dest.stream.getAudioTracks()
                ]);

                status.innerText = '状態: サーバー接続中...';
                
                const safePass = btoa(unescape(encodeURIComponent(pass))).replace(/=/g, '');
                const peerId = 'yshere-v105-' + safePass;
                
                const peer = new Peer(peerId);

                peer.on('open', () => {
                    status.innerText = '状態: 接続待機中 (OBS側を開いてください)';
                    status.style.color = '#ffca28';
                    startBtn.disabled = true;
                });

                peer.on('call', (call) => {
                    call.answer(combinedStream);
                    status.innerText = `状態: 配信中！(${vTrack.label})`;
                    status.style.color = '#4caf50';
                });

                peer.on('error', (err) => {
                    status.innerText = 'エラー: ' + err.type;
                    status.style.color = '#f44336';
                });

            } catch (err) {
                alert('画面共有エラー: ' + err.message);
            }
        };
    </script>
</body>
</html>
