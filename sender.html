<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画面＆音声 送信ツール v1.0.8</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 8px; max-width: 420px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .version { background: #ffc107; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        #status { margin-top: 15px; font-weight: bold; color: #ffca28; word-break: break-all; }
        .note { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <h2 style="margin:0;">画面・音声 送信</h2>
            <span class="version">v1.0.8</span>
        </div>
        <div style="margin-top: 15px;">
            <label>パスワード (共有キー)</label>
            <input type="password" id="pass" placeholder="半角英数字で入力">
            <button id="startBtn">画面共有を開始する</button>
            <div class="note">
                ※ ダイアログ左下の<b>「システムのオーディオも共有する」</b>をONにしてください。
            </div>
        </div>
        <div id="status">状態: 待機中</div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            const pass = document.getElementById('pass').value.trim();
            if (!pass) return alert('パスワードを入力してください');

            try {
                // 1. 画面共有の取得 (映像＋システム音声)
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 60, max: 60 } },
                    audio: true
                });

                const vTrack = displayStream.getVideoTracks()[0];
                if (!vTrack) {
                    alert('画面キャプチャの取得に失敗しました');
                    return;
                }

                // 2. 画面音声トラックの直接取得
                const displayAudioTracks = displayStream.getAudioTracks();
                console.log('取得したシステム音声トラック:', displayAudioTracks);

                // 3. マイク音声の試行（エラーが出ても画面音声の邪魔をしないように完全に分離）
                let micTrack = null;
                try {
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    if (micStream.getAudioTracks().length > 0) {
                        micTrack = micStream.getAudioTracks()[0];
                    }
                } catch (e) {
                    console.log('マイク不使用、または許可なし');
                }

                // 4. 音声トラックの整理（画面音声優先）
                const finalAudioTracks = [];

                if (displayAudioTracks.length > 0 && micTrack) {
                    // 両方ある場合は Web Audio API でミックス
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        if (audioCtx.state === 'suspended') {
                            await audioCtx.resume();
                        }
                        const dest = audioCtx.createMediaStreamDestination();
                        
                        const src1 = audioCtx.createMediaStreamSource(new MediaStream([displayAudioTracks[0]]));
                        const src2 = audioCtx.createMediaStreamSource(new MediaStream([micTrack]));
                        
                        src1.connect(dest);
                        src2.connect(dest);
                        
                        finalAudioTracks.push(dest.stream.getAudioTracks()[0]);
                    } catch (mixErr) {
                        console.warn('ミックス失敗のためシステム音声を優先します:', mixErr);
                        finalAudioTracks.push(displayAudioTracks[0]);
                    }
                } else if (displayAudioTracks.length > 0) {
                    // システム音声のみ
                    finalAudioTracks.push(displayAudioTracks[0]);
                } else if (micTrack) {
                    // マイクのみ
                    finalAudioTracks.push(micTrack);
                }

                // ストリーム結合
                const combinedStream = new MediaStream([vTrack, ...finalAudioTracks]);

                status.innerText = '状態: サーバー接続中...';
                
                const safePass = btoa(unescape(encodeURIComponent(pass))).replace(/=/g, '');
                const targetId = 'yshere-v106-' + safePass; // 受信側との互換性保持
                
                const peer = new Peer(targetId);

                peer.on('open', () => {
                    status.innerText = `状態: 接続待機中 (音声:${finalAudioTracks.length}本)`;
                    status.style.color = '#ffca28';
                    startBtn.disabled = true;

                    if (finalAudioTracks.length === 0) {
                        alert('⚠️ システム音声が検出されませんでした。\nブラウザの共有ダイアログで「システムのオーディオも共有する」がチェックされているか確認してください。');
                    }
                });

                peer.on('call', (call) => {
                    call.answer(combinedStream);
                    status.innerText = `状態: 配信中！ (映像:1本 / 音声:${finalAudioTracks.length}本)`;
                    status.style.color = '#4caf50';
                });

                peer.on('error', (err) => {
                    status.innerText = 'エラー: ' + err.type;
                    status.style.color = '#f44336';
                });

            } catch (err) {
                alert('画面共有エラー: ' + err.message);
            }
        };
    </script>
</body>
</html>
